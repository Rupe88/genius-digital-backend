# Production stack — bind API to localhost; Nginx terminates TLS and proxies to 4000.
# Usage on server: copy .env next to this file, then:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: genius-digital-backend:latest
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "4000"
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    command: ["npm", "run", "start:migrate"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
