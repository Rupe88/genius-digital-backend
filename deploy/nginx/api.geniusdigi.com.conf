# 1) Copy to /etc/nginx/sites-available/api.geniusdigi.com
# 2) sudo ln -sf /etc/nginx/sites-available/api.geniusdigi.com /etc/nginx/sites-enabled/
# 3) sudo nginx -t && sudo systemctl reload nginx
# 4) sudo certbot --nginx -d api.geniusdigi.com   (adds TLS and redirects HTTP→HTTPS)

upstream genius_lms_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.geniusdigi.com;

    client_max_body_size 3500m;
    client_body_timeout 600s;

    location / {
        proxy_pass http://genius_lms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
