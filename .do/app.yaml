name: vaastu-lms-backend
# Use new Node buildpack so package.json "engines": { "node": ">=20" } is respected (removes AWS SDK Node 18 deprecation warning)
features:
- new-nodejs-buildpack=true
services:
- name: api
  source_dir: /
  github:
    repo: Rupe88/genius-digital-backend
    branch: main
    deploy_on_push: true
  run_command: npm run start
  build_command: npm run build
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8080"
  # Database Configuration - SET THESE IN DIGITAL OCEAN DASHBOARD
  - key: DATABASE_URL
    type: SECRET
    value: "${SUPABASE_DATABASE_URL}"
  - key: DIRECT_URL
    type: SECRET
    value: "${SUPABASE_DIRECT_URL}"
  # JWT Configuration
  - key: JWT_ACCESS_SECRET
    type: SECRET
    value: "${JWT_ACCESS_SECRET}"
  - key: JWT_REFRESH_SECRET
    type: SECRET
    value: "${JWT_REFRESH_SECRET}"
  - key: JWT_ACCESS_EXPIRY
    value: "15m"
  - key: JWT_REFRESH_EXPIRY
    value: "7d"
  # Email Configuration
  - key: SMTP_HOST
    value: smtp.gmail.com
  - key: SMTP_PORT
    value: "587"
  - key: SMTP_USER
    type: SECRET
    value: "${SMTP_USER}"
  - key: SMTP_PASS
    type: SECRET
    value: "${SMTP_PASS}"
  # Resend Email (Fallback)
  - key: RESEND_API_KEY
    type: SECRET
    value: "${RESEND_API_KEY}"
  - key: RESEND_FROM_EMAIL
    type: SECRET
    value: "${RESEND_FROM_EMAIL}"
  # Application Settings
  - key: APP_NAME
    value: "Vaastu LMS Platform"
    
  # Video optimization (FFmpeg). On VPS: install ffmpeg; if app still can't find it, add env FFMPEG_PATH (or output of: which ffmpeg)
  - key: VIDEO_OPTIMIZATION_ENABLED
    value: "true"
  - key: FFMPEG_PATH
    value: "/usr/bin/ffmpeg"
  - key: FRONTEND_URL
    value: "https://sanskarvastu.com"
  - key: BACKEND_URL
    value: "https://stingray-app-2-iy8as.ondigitalocean.app"
  # Google OAuth Configuration
  - key: GOOGLE_CLIENT_ID
    type: SECRET
    value: "${GOOGLE_CLIENT_ID}"
  - key: GOOGLE_CLIENT_SECRET
    type: SECRET
    value: "${GOOGLE_CLIENT_SECRET}"
  # Supabase Storage — same project as Postgres; create bucket + policies in Supabase Dashboard
  - key: SUPABASE_URL
    value: "${SUPABASE_URL}"
  - key: SUPABASE_SERVICE_ROLE_KEY
    type: SECRET
    value: "${SUPABASE_SERVICE_ROLE_KEY}"
  - key: SUPABASE_STORAGE_BUCKET
    value: "lms-media"
  # Return signed storage URLs for playback when backend cannot stream (e.g. App Platform)
  - key: USE_SIGNED_VIDEO_URL
    value: "true"
  # Sparrow SMS Configuration (Nepal) - Optional; when set, OTP can be sent via SMS
  - key: SPARROW_SMS_TOKEN
    type: SECRET
    value: "${SPARROW_SMS_TOKEN}"
  - key: SPARROW_SMS_FROM
    value: "${SPARROW_SMS_FROM}"
  health_check:
    http_path: /health
  # CORS Configuration for production
  - key: CORS_ORIGINS
    value: "https://sanskarvastu.com,https://www.sanskarvastu.com,http://localhost:3000"
databases:
- name: postgres
  engine: PG
  version: "15"
  size: basic
  num_nodes: 1
